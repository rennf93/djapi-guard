"area: middleware":
  - changed-files:
      - any-glob-to-any-file:
          - djangoapi_guard/middleware.py
          - tests/test_middleware.py

"area: adapters":
  - changed-files:
      - any-glob-to-any-file:
          - djangoapi_guard/adapters.py
          - tests/test_adapters.py

"area: decorators":
  - changed-files:
      - any-glob-to-any-file:
          - tests/test_decorators/**

"area: integrations":
  - changed-files:
      - any-glob-to-any-file:
          - djangoapi_guard/__init__.py
          - tests/test_extension/**
          - tests/test_reexports.py
          - tests/settings.py
          - tests/urls.py

tests:
  - changed-files:
      - any-glob-to-any-file:
          - tests/**

examples:
  - changed-files:
      - any-glob-to-any-file:
          - examples/**

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - mkdocs.yml
          - README.md
          - CHANGELOG.md
          - CONTRIBUTING.md
          - SECURITY.md
          - CODE_OF_CONDUCT.md
          - LICENSE

ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**
          - .pre-commit-config.yaml

build:
  - changed-files:
      - any-glob-to-any-file:
          - Makefile
          - Dockerfile
          - compose.yml
          - setup.py
          - MANIFEST.in
          - vulture_whitelist.py

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - pyproject.toml
          - uv.lock
